# Server configuration
server.port=3501

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application name
spring.application.name=hair-style-analyzer

# Groq skin-analysis integration
groq.api.key=${GROQ_API_KEY:}
groq.skin.model=${GROQ_SKIN_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
groq.responses.url=${GROQ_RESPONSES_URL:https://api.groq.com/openai/v1/chat/completions}
